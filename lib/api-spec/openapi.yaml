openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trends
    description: Trending tags operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /trends:
    get:
      operationId: getTrends
      tags: [trends]
      summary: Get trending tags
      description: >
        Returns a ranked list of trending topics for India, in Hindi.
        All fields are derived from real RSS headlines — no simulated counts or fake posts.
        Results are cached for 30 minutes.
      responses:
        "200":
          description: Trending tags list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendsResponse"
        "500":
          description: Failed to fetch trends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    TrendMomentum:
      type: string
      enum: [rising, peaking, cooling]
    TrendCategory:
      type: string
      enum: [sports, news, entertainment, festival, finance, tech, weather, politics, viral]
    TrendSource:
      type: string
      enum: [search, social, news, video, cross-platform]
    TrendItem:
      type: object
      properties:
        id:
          type: string
          description: Kebab-case slug identifier
        rank:
          type: integer
          description: Rank among today's trends, 1 = hottest
        tag:
          type: string
          description: Hindi hashtag e.g. #भारतVsऑस्ट्रेलिया
        titleHi:
          type: string
          description: Short Hindi title (5–8 words, Devanagari)
        descriptionHi:
          type: string
          description: One-line Hindi description of why it is trending (Devanagari, max 25 words)
        category:
          $ref: "#/components/schemas/TrendCategory"
        categoryLabelHi:
          type: string
          description: Hindi label for the category
        heat:
          type: integer
          minimum: 60
          maximum: 100
          description: >
            Deterministically computed trending intensity (60–100). NOT generated by AI.
            Formula: volumeScore (headlineCount × 8, cap 40)
                   + sourceScore (sources.length × 5)
                   + freshnessScore (20/15/10/5 by age tier)
                   - recencyPenalty (startedHoursAgo ÷ 10, cap 10)
                   + keywordBoost (max keyword repetition × 2, cap 10),
            clamped to [60, 100]. Weights live in trendScoring.ts and are tunable.
            NOT a real-time platform metric — derived only from RSS headlines.
        headlineCount:
          type: integer
          description: Number of RSS headlines fetched that were clustered into this trend
        sources:
          type: array
          items:
            $ref: "#/components/schemas/TrendSource"
          description: Which signal channels this trend was detected across
        primarySource:
          $ref: "#/components/schemas/TrendSource"
          description: The dominant signal channel for this trend
        region:
          type: string
          description: Most relevant Indian region in Hindi (e.g. "अखिल भारत", "मुंबई")
        startedHoursAgo:
          type: integer
          description: >
            AI estimate of how many hours ago this topic began trending,
            inferred from headline timestamps and phrasing. Not sourced from any platform API.
        momentum:
          $ref: "#/components/schemas/TrendMomentum"
          description: >
            Deterministically computed trend trajectory. NOT generated by AI.
            rising  = startedHoursAgo ≤ 6 AND headlineCount ≥ 3 (fresh burst),
            peaking = startedHoursAgo ≤ 24 AND headlineCount ≥ 4 (full coverage),
            cooling = all other cases (older or thin coverage).
            Logic lives in trendScoring.ts and is tunable.
        topLanguages:
          type: array
          items:
            type: string
          description: Indian languages this topic is most discussed in (Hindi names)
        sourceHeadlines:
          type: array
          items:
            type: string
          description: >
            The actual RSS headline texts that were clustered into this trend.
            These are real, verbatim strings from the news feeds — not generated.
      required:
        - id
        - rank
        - tag
        - titleHi
        - descriptionHi
        - category
        - categoryLabelHi
        - heat
        - headlineCount
        - sources
        - primarySource
        - region
        - startedHoursAgo
        - momentum
        - topLanguages
        - sourceHeadlines
    TrendsResponse:
      type: object
      properties:
        trends:
          type: array
          items:
            $ref: "#/components/schemas/TrendItem"
        fetchedAt:
          type: string
          format: date-time
          description: UTC timestamp when RSS feeds were fetched
        cachedUntil:
          type: string
          format: date-time
          description: UTC timestamp when this result expires and a fresh fetch will occur
        headlinesUsed:
          type: integer
          description: Total number of RSS headlines processed in this request
      required:
        - trends
        - fetchedAt
        - cachedUntil
        - headlinesUsed
