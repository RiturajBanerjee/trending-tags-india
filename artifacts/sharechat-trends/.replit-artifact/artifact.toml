kind = "mobile"
previewPath = "/"
title = "ShareChat Trends"
version = "1.0.0"
id = "artifacts/sharechat-trends"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20240

[services.development]
run = "pnpm --filter @workspace/sharechat-trends run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sharechat-trends", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sharechat-trends", "run", "serve" ]

[services.env]
PORT = "20240"
BASE_PATH = "/"
